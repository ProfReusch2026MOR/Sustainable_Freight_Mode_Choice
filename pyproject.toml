[tool.ruff]
# Exclude third-party folders and virtual environments
exclude = [
    ".git",
    ".venv",
    "OperationsResearchLecture2026",
    "notebooks",
    "Heuristic",
]

# Formatting standards (matching Black defaults)
line-length = 88
indent-width = 4

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
